<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no"/>
    <meta http-equiv="x-ua-compatible" content="ie=edge"/>
    <title>设置</title>
    <!--css-->
    <link rel="stylesheet" href="../libs/element_ui/element_ui_1.2.0-beta.6.css">
    <link rel="stylesheet" href="../res/img.css">
    <link rel="stylesheet" href="../res/ali/iconfont.css">
    <link rel="stylesheet" href="../index.css">
    <!-- 必要库 -->
    <script src='../libs/jquery-3.1.1.min.js'></script>
    <!-- vue -->
    <script src="../libs/vue/vue.3.2.26.js"></script>
    <script src="../libs/vue/vue-router.4.0.12.js"></script>
    <script src="../libs/vue/httpVueLoader_1.4.2.js"></script>
    <!-- eui -->
    <script src="../libs/element_ui/element_plus_1.2.0-beta.6.js"></script>
    <script src="../libs/element_ui/element-resize-detector.min.js"></script>
    <script src="../res/language.js"></script>
    <style>
        html, body, #app, #router-view {
            margin: 0;
            height: 100%;
            font-family: "YouYuan";
        }
    </style>
</head>
<body onload="onload()" onbeforeunload="beforeunload()" oncontextmenu=self.event.returnValue=false>
<div id="app">
    <router-view id="router-view"></router-view>
</div>
<script>
    function onload() {

    }

    function beforeunload() {
        //todo 停止预览摄像头
    }

    //----------------------------------Vue------------------------------------
    const app = Vue.createApp({})
    const router = VueRouter.createRouter({
        history: VueRouter.createWebHashHistory(),
        routes: [
            {
                path: '/', name: 'Welcome', component: httpVueLoader('PageWelcome.vue'),
            },
            {
                path: '/check_camera', name: 'CheckCamera', component: httpVueLoader('PageCheckCamera.vue'),
            },
            {
                path: '/check_microphone', name: 'CheckMicrophone', component: httpVueLoader('PageCheckMicrophone.vue'),
            },
            {
                path: '/check_speaker', name: 'CheckSpeaker', component: httpVueLoader('PageCheckSpeaker.vue'),
            },
        ]
    })
    app.use(router)
    app.use(ElementPlus)
    app.use(elementResizeDetectorMaker)
    app.mount('#app')
    //----------------------------------Vue------------------------------------
    let elm_loading;

    function showLoading(msg = '请稍等......') {
        elm_loading = ElementPlus.ElLoading.service({
            lock: true,
            text: msg,
            background: 'rgba(0, 0, 0, 0.7)',
        })
    }

    function closeLoading() {
        elm_loading.close();
    }

    function debounce(fn, delay, isImmediate) {
        var timer = null;  //初始化timer，作为计时清除依据
        return function () {
            let context = this;  //获取函数所在作用域this
            let args = arguments;  //取得传入参数
            clearTimeout(timer);
            if (isImmediate && timer === null) {
                //时间间隔外立即执行
                fn.apply(context, args);
                timer = 0;
                return;
            }
            timer = setTimeout(function () {
                fn.apply(context, args);
                timer = null;
            }, delay);
        }
    }

</script>
</body>
</html>
