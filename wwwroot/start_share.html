<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no"/>
    <meta http-equiv="x-ua-compatible" content="ie=edge"/>
    <title>Title</title>
    <link rel="stylesheet" href="libs/bootstrap/bootstrap.css">
    <link rel="stylesheet" href="index.css">
    <!-- 必要库 -->
    <script src='libs/jquery-3.1.1.min.js'></script>
    <script src='libs/bootstrap/bootstrap.bundle.js'></script>
    <style>
        html, body {
            margin: 0;
            height: 100%;
            font-family: "YouYuan";
        }

        #container {
            height: 100%;
            padding: 64px;
        }

        .card-input-element + .card {
            height: calc(36px + 2 * 1rem);
            color: var(--primary);
            -webkit-box-shadow: none;
            box-shadow: none;
            border: 2px solid transparent;
            border-radius: 4px;
        }

        .card-input-element + .card:hover {
            cursor: pointer;
        }

        .card-input-element:checked + .card {
            border: 2px solid var(--primary);
            -webkit-transition: border .3s;
            -o-transition: border .3s;
            transition: border .3s;
        }

        .card-input-element:checked + .card::after {
            content: '\e5ca';
            color: #AFB8EA;
            font-family: 'Material Icons';
            font-size: 24px;
            -webkit-animation-name: fadeInCheckbox;
            animation-name: fadeInCheckbox;
            -webkit-animation-duration: .5s;
            animation-duration: .5s;
            -webkit-animation-timing-function: cubic-bezier(0.4, 0, 0.2, 1);
            animation-timing-function: cubic-bezier(0.4, 0, 0.2, 1);
        }

        @-webkit-keyframes fadeInCheckbox {
            from {
                opacity: 0;
                -webkit-transform: rotateZ(-20deg);
            }
            to {
                opacity: 1;
                -webkit-transform: rotateZ(0deg);
            }
        }

        @keyframes fadeInCheckbox {
            from {
                opacity: 0;
                transform: rotateZ(-20deg);
            }
            to {
                opacity: 1;
                transform: rotateZ(0deg);
            }
        }
    </style>
</head>
<body onload="onload()">
<div id="container" class="container">
    <nav>
        <div class="nav nav-tabs" id="nav-tab" role="tablist">
            <button class="nav-link active" id="nav-monitor-tab" data-toggle="tab" data-target="#nav-monitor"
                    type="button"
                    role="tab" aria-controls="nav-monitor" aria-selected="true">整个屏幕
            </button>
            <button class="nav-link" id="nav-window-tab" data-toggle="tab" data-target="#nav-window" type="button"
                    role="tab" aria-controls="nav-window" aria-selected="false">程序/文件
            </button>
        </div>
    </nav>
    <div class="tab-content" id="nav-tabContent">
        <div class="tab-pane fade show active p-4" id="nav-monitor" role="tabpanel" aria-labelledby="nav-monitor-tab">
        </div>
        <div class="tab-pane fade p-4" id="nav-window" role="tabpanel" aria-labelledby="nav-window-tab">
        </div>
    </div>
    <div>

    </div>
</div>

<script>
    let ShareTypeMonitor = 'monitor_selection'
    let ShareTypeWindow = 'window_selection'
    let curShareType;
    let curMonitorShareId, curWindowShareId;


    function onload() {
        try {
            let json = StartShareJsProxy.getWindowsJson()
            console.log(json)
            initSelections(json)
        } catch (e) {
            console.log(e)
            $.ajax({//加载测试数据
                type: 'get',
                dataType: 'json',
                url: 'libs/test/start_share_test.json',
                success: resp => {
                    initSelections(resp)
                }
            })
        }
    }

    function initSelections(json) {
        let obj = typeof json == 'object' ? json : JSON.parse(json)
        console.log(obj)

        //初始化显示器共享
        $('#nav-monitor').html('')
        let camera4 = obj.data.camera4
        camera4.list.forEach(function (val, index) {
            if (val === '关闭') return;
            let isSelected = val === camera4.inUse ? 'selected' : ''
            $('#nav-monitor').append(generateRadio(ShareTypeMonitor, val, `显示器 ${index}`, isSelected))
        })
        $('#nav-monitor').append(`<br><button id="btn_share_monitor" type="button" class="btn btn-success" disabled onclick="onMonitorShareClick()">开始共享
        </button>`)
        setRadioChangedListener(ShareTypeMonitor, function () {
            console.log(`selected -${ShareTypeMonitor}- -> `, this.value)
            curShareType = ShareTypeMonitor
            curMonitorShareId = this.value
            $('#btn_share_monitor').attr('disabled', false)
        })

        //初始化窗口共享
        $('#nav-window').html('')
        let camera5 = obj.data.camera5
        camera5.list.forEach(function (val, index) {
            if (val === '关闭') return;
            let isSelected = val === camera5.inUse ? 'selected' : ''
            $('#nav-window').append(generateRadio(ShareTypeWindow, val, val, isSelected))
        })
        $('#nav-window').append(`<br><button id="btn_share_window" type="button" class="btn btn-success" disabled onclick="onWindowShareClick()">开始共享
        </button>`)
        setRadioChangedListener(ShareTypeWindow, function () {
            console.log(`selected -${ShareTypeWindow}- -> `, this.value)
            curShareType = ShareTypeWindow
            curWindowShareId = this.value
            $('#btn_share_window').attr('disabled', false)
        })
    }

    function generateRadio(group, value, display, checked) {
        return `<label>
                <input type="radio" name="${group}" class="card-input-element d-none" value="${value}" ${checked ? 'checked="true"' : ''}>
                <span class="card card-body bg-light d-flex flex-row justify-content-between align-items-center">
                    ${display}
                </span>
            </label>`
    }

    function setRadioChangedListener(radioName, callback) {
        $(`input[type=radio][name=${radioName}]`).change(callback)
    }

    function onMonitorShareClick() {
        console.log(`onMonitorShareClick id: %s`, curMonitorShareId)
        try {
            StartShareJsProxy.assignMonitorShare(curMonitorShareId)
            StartShareJsProxy.closeWindow()
        } catch (e) {
            console.log('选择显示器失败', e)
        }
    }

    function onWindowShareClick() {
        console.log(`onWindowShareClick id: %s`, curWindowShareId)
        try {
            StartShareJsProxy.assignWindowShare(curWindowShareId)
            StartShareJsProxy.closeWindow()
        } catch (e) {
            console.log('选择窗口失败', e)
        }
    }

</script>
</body>
</html>
