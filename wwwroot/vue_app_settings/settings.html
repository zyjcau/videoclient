            height: 100%;

</head>
<body onload="onload()" onbeforeunload="beforeunload()" oncontextmenu=self.event.returnValue=false>
<div id="app">
    <router-view id="router-view"></router-view>
</div>
<script>

    const tangoWin = new TangoWin();
    tangoWin.getSystemStatusJson({})

    function onload() {
        // checkProxy()
        try {
            console.log(SettingsJsProxy.getCamera1Json())
        } catch (e) {
            console.log(e)
        }
    }

    function beforeunload() {
        //todo 停止预览摄像头
    }

    //----------------------------------Vue------------------------------------
    const app = Vue.createApp({})
    const router = VueRouter.createRouter({
        history: VueRouter.createWebHashHistory(),
        routes: [
            {
                path: '/',
                redirect: '/audio_video',//初始页面
                name: 'Main',
                component: httpVueLoader('PageMain.vue'),
                children: [
                    {
                        path: '/audio_video',
                        name: 'audio_video',
                        component: httpVueLoader('PageSettingsAudioVideo.vue')
                    },
                    {
                        path: '/more_video',
                        name: 'more_video',
                        component: httpVueLoader('PageSettingsMoreVideo.vue')
                    },
                    {
                        path: '/more_settings',
                        name: 'more_settings',
                        component: httpVueLoader('../vue/ModuleSettingsNormal.vue')
                    },
                ]
            },
        ]
    })

    // registerComponent(app, 'settings-normal', '../vue/ModuleSettingsNormal.vue')

    app.use(router)
    app.use(ElementPlus)
    app.use(elementResizeDetectorMaker)
    app.mount('#app')
    //----------------------------------Vue------------------------------------


    let elm_loading;

    function showLoading() {
        elm_loading = ElementPlus.ElLoading.service({
            lock: true,
            text: '请稍等......',
            background: 'rgba(0, 0, 0, 0.7)',
        })
    }

    function closeLoading() {
        elm_loading.close();
    }

    function debounce(fn, delay, isImmediate) {
        var timer = null;  //初始化timer，作为计时清除依据
        return function () {
            let context = this;  //获取函数所在作用域this
            let args = arguments;  //取得传入参数
            clearTimeout(timer);
            if (isImmediate && timer === null) {
                //时间间隔外立即执行
                fn.apply(context, args);
                timer = 0;
                return;
            }
            timer = setTimeout(function () {
                fn.apply(context, args);
                timer = null;
            }, delay);
        }
    }

    function registerComponent(vueApp, vueComponentName, vueFile) {
        let c = httpVueLoader(vueFile)
        c().then(p => {
            vueApp.component(vueComponentName, p)
        })
    }

</script>
</body>
</html>
