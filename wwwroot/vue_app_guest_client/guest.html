<script>

        // checkProxy()

        //todo 停止预览摄像头

    //----------------------------------Vue------------------------------------
    const app = Vue.createApp({})
    const router = VueRouter.createRouter({
        history: VueRouter.createWebHashHistory(),
        routes: [
            {path: '/', name: 'Welcome', component: httpVueLoader('PageWelcome.vue')},
            {path: '/video', name: 'Video', component: httpVueLoader('../vue/PageVideo.vue')},
            {path: '/test', name: 'Test', component: httpVueLoader('test.vue')},//test code
        ]
    })
    registerComponent(app, 'settings-layout', '../vue/ModuleSettingsLayout.vue')
    registerComponent(app, 'text-chat', '../vue/ModuleChat.vue')

    if (tangoWin.getQueryParam('isTest') === '1') router.push('/test')//load test page
    //----------------------------------Vue------------------------------------


    let elm_loading;

    function showLoading(msg) {
        elm_loading = ElementPlus.ElLoading.service({
            lock: true,
            text: msg,
            background: 'rgba(0, 0, 0, 0.7)',
        })
    }

    function closeLoading() {
        if (elm_loading) elm_loading.close();
    }

    function debounce(fn, delay, isImmediate) {
        var timer = null;  //初始化timer，作为计时清除依据
        return function () {
            let context = this;  //获取函数所在作用域this
            let args = arguments;  //取得传入参数
            clearTimeout(timer);
            if (isImmediate && timer === null) {
                //时间间隔外立即执行
                fn.apply(context, args);
                timer = 0;
                return;
            }
            timer = setTimeout(function () {
                fn.apply(context, args);
                timer = null;
            }, delay);
        }
    }

    function registerComponent(vueApp, vueComponentName, vueFile) {
        let c = httpVueLoader(vueFile)
        c().then(p => {
            vueApp.component(vueComponentName, p)
        })
    }

</script>
